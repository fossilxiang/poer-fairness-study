<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <rect width="1000" height="600" fill="white"/>
  <text x="500" y="50" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">F-PoER Mechanism Design</text>
  <rect x="80" y="190" width="200" height="120" fill="#1f77b4" stroke="black" stroke-width="2" opacity="0.2" rx="10"/>
  <rect x="80" y="190" width="200" height="120" fill="none" stroke="#1f77b4" stroke-width="3" rx="10"/>
  <text x="180" y="230" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1f77b4">Temporal</text>
  <text x="180" y="255" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1f77b4">Fragmentation</text>
  <text x="180" y="265" text-anchor="middle" font-family="Arial" font-size="12" fill="black">6 windows/day</text>
  <text x="180" y="285" text-anchor="middle" font-family="Arial" font-size="12" fill="black">(4h each)</text>
  <rect x="400" y="190" width="200" height="120" fill="#2ca02c" stroke="black" stroke-width="2" opacity="0.2" rx="10"/>
  <rect x="400" y="190" width="200" height="120" fill="none" stroke="#2ca02c" stroke-width="3" rx="10"/>
  <text x="500" y="230" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2ca02c">Relative Entropy</text>
  <text x="500" y="255" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2ca02c">Reduction</text>
  <text x="500" y="265" text-anchor="middle" font-family="Arial" font-size="12" fill="black">vs. window average</text>
  <rect x="720" y="190" width="200" height="120" fill="#ff7f0e" stroke="black" stroke-width="2" opacity="0.2" rx="10"/>
  <rect x="720" y="190" width="200" height="120" fill="none" stroke="#ff7f0e" stroke-width="3" rx="10"/>
  <text x="820" y="230" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ff7f0e">Hybrid</text>
  <text x="820" y="255" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ff7f0e">Allocation</text>
  <text x="820" y="265" text-anchor="middle" font-family="Arial" font-size="12" fill="black">50% baseline +</text>
  <text x="820" y="285" text-anchor="middle" font-family="Arial" font-size="12" fill="black">50% performance</text>
  <line x1="285" y1="250" x2="395" y2="250" stroke="gray" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="605" y1="250" x2="715" y2="250" stroke="gray" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="gray" />
    </marker>
  </defs>
  <rect x="350" y="420" width="300" height="100" fill="#2ca02c" stroke="black" stroke-width="2" opacity="0.2" rx="10"/>
  <rect x="350" y="420" width="300" height="100" fill="none" stroke="#2ca02c" stroke-width="3" rx="10"/>
  <text x="500" y="455" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#006400">Gini: 0.85 → 0.16</text>
  <text x="500" y="485" text-anchor="middle" font-family="Arial" font-size="14" fill="#006400">(81% improvement)</text>
  <line x1="500" y1="375" x2="500" y2="415" stroke="#2ca02c" stroke-width="3" marker-end="url(#arrow)"/>
