name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy
    
    - name: Run Original PoER Experiment
      run: |
        cd experiments
        python3 poer_experiment_simple.py
    
    - name: Run F-PoER Experiment
      run: |
        cd experiments
        python3 poer_fpoe_experiment.py
    
    - name: Verify Results
      run: |
        python3 -c "
        import json
        with open('data/results.json') as f:
            orig = json.load(f)
        with open('data/results_fpoe.json') as f:
            fpoe = json.load(f)
        
        # Check Gini coefficients
        gini_orig = orig['summary']['avg_gini_poer']
        gini_fpoe = fpoe['summary']['avg_gini_fpoe']
        
        print(f'Original PoER Gini: {gini_orig:.4f}')
        print(f'F-PoER Gini: {gini_fpoe:.4f}')
        print(f'Fairness Improvement: {(1 - gini_fpoe/gini_orig)*100:.1f}%')
        
        # Assertions
        assert 0.80 < gini_orig < 0.90, f'Original Gini out of range: {gini_orig}'
        assert 0.10 < gini_fpoe < 0.25, f'F-PoER Gini out of range: {gini_fpoe}'
        print('✓ All assertions passed!')
        "
    
    - name: Generate Figures
      run: |
        cd scripts
        python3 generate_all_figures.py
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: experimental-results
        path: |
          data/*.json
          paper/figures/*.svg
        retention-days: 30

  latex-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up LaTeX
      uses: xu-cheng/texlive-action@v2
      with:
        scheme: full
    
    - name: Compile Paper
      run: |
        cd paper
        pdflatex -interaction=nonstopmode paper_main.tex
        bibtex paper_main.aux
        pdflatex -interaction=nonstopmode paper_main.tex
        pdflatex -interaction=nonstopmode paper_main.tex
    
    - name: Upload PDF
      uses: actions/upload-artifact@v3
      with:
        name: paper-pdf
        path: paper/paper_main.pdf
        retention-days: 30
